spring.datasource.url=jdbc:h2:mem:weather_ai_testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.cache.type=none
spring.data.redis.repositories.enabled=false

jwt.secret=ThisIsADummySecretKeyForTestingPurposesOnlyNeedsToBeLongEnough
jwt.expiration.ms=86400000

weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=dummy_weather_api_key_for_testing

ai.base-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
ai.api-key=dummy_gemini_api_key_for_testing