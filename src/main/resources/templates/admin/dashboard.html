<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Weather_AI | Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/admin/style.css}" rel="stylesheet" />
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar" class="shadow-sm">
        <div class="sidebar-heading text-center py-4 fs-5 fw-bold text-white border-bottom border-secondary">
            <i class="fa-solid fa-cloud-bolt text-warning me-2"></i>Weather_AI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="#" class="nav-link active"><i class="fa-solid fa-gauge"></i>Tổng quan</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-users"></i>Quản lý User</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-map-location-dot"></i>Địa điểm yêu thích</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-robot"></i>Lịch sử AI</a>
            <a href="#" class="nav-link mt-5 text-danger"><i class="fa-solid fa-right-from-bracket"></i>Đăng xuất</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light navbar-custom py-3 px-4 shadow-sm mb-4">
            <div class="d-flex align-items-center">
                <h4 class="m-0 text-secondary fw-bold">Dashboard</h4>
            </div>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted" th:text="${welcomeMessage}">Quản trị viên</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin" class="rounded-circle shadow-sm" width="40">
            </div>
        </nav>

        <div class="container-fluid px-4">

            <div class="row g-4 mb-4">
                <div class="col-12 col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted fw-bold mb-2">TỔNG REQUESTS API</h6>
                                <h3 class="fw-bold mb-0 text-dark">1,542</h3>
                            </div>
                            <div class="icon-box bg-gradient-primary shadow"><i class="fa-solid fa-server"></i></div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted fw-bold mb-2">LỜI KHUYÊN AI TẠO RA</h6>
                                <h3 class="fw-bold mb-0 text-dark">980</h3>
                            </div>
                            <div class="icon-box bg-gradient-success shadow"><i class="fa-solid fa-brain"></i></div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card stat-card shadow-sm h-100 p-3">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted fw-bold mb-2">USER HOẠT ĐỘNG</h6>
                                <h3 class="fw-bold mb-0 text-dark" th:text="${activeUsers}">0</h3>
                            </div>
                            <div class="icon-box bg-gradient-warning shadow"><i class="fa-solid fa-users"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12 col-xl-7">
                    <div class="card shadow-sm border-0 rounded-3 h-100">
                        <div class="card-header bg-white border-bottom pt-4 pb-3 px-4">
                            <h5 class="fw-bold text-secondary m-0">Lưu lượng truy cập (7 ngày qua)</h5>
                        </div>
                        <div class="card-body p-4">
                            <canvas id="trafficChart" height="120"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-xl-5">
                    <div class="card shadow-sm border-0 rounded-3 h-100">
                        <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold text-secondary m-0">Địa điểm mới lưu</h5>
                            <button class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-download me-1"></i>Xuất báo cáo</button>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover table-custom mb-0 text-center align-middle">
                                    <thead>
                                    <tr>
                                        <th>User</th>
                                        <th>Thành phố</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="al : ${recentLocations}">
                                        <td class="fw-bold text-primary" th:text="${al.account.username}">User</td>
                                        <td th:text="${al.location.cityName}">Thành phố</td>
                                        <td><span class="badge bg-success">Đã lưu</span></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/js/admin/script.js}"></script>
</body>
</html>
