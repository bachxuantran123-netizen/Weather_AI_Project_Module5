<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_AI | Hệ Thống Quản Trị</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link th:href="@{/css/admin/login.css}" rel="stylesheet" />
</head>
<body>

<div class="login-box">
    <h4 class="title-neon text-center"><i class="fa-solid fa-cloud-bolt me-2 text-warning"></i>SYSTEM_LOGIN</h4>

    <div id="error-message"><i class="fa-solid fa-triangle-exclamation me-1"></i> <span id="error-text">Sai tài khoản hoặc mật khẩu!</span></div>

    <form id="loginForm">
        <div class="mb-4">
            <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">USERNAME</label>
            <input type="text" class="form-control cyber-input" id="username" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">PASSWORD</label>
            <input type="password" class="form-control cyber-input" id="password" required>
        </div>
        <button type="submit" class="cyber-btn" id="loginBtn">Xác Thực Cấp Quyền</button>
    </form>
</div>

<script th:src="@{/js/admin/login.js}"></script>
</body>
</html>
