<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Weather_AI | Địa điểm yêu thích</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/admin/style.css}" rel="stylesheet" />
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar" class="shadow-sm">
        <div class="sidebar-heading text-center py-4 fs-5 fw-bold text-white border-bottom border-secondary">
            <i class="fa-solid fa-cloud-bolt text-warning me-2"></i>Weather_AI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-gauge"></i>Tổng quan</a>
            <a href="/admin/users" class="nav-link"><i class="fa-solid fa-users"></i>Quản lý User</a>
            <a href="/admin/locations" class="nav-link active"><i class="fa-solid fa-map-location-dot"></i>Địa điểm yêu thích</a>
            <a href="/admin/ai-history" class="nav-link"><i class="fa-solid fa-robot"></i>Lịch sử AI</a>
            <a href="/admin/community" class="nav-link"><i class="fa-solid fa-newspaper"></i>Cộng đồng</a>
            <a href="#" class="nav-link mt-5 text-danger"><i class="fa-solid fa-right-from-bracket"></i>Đăng xuất</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-custom py-3 px-4 shadow-sm mb-4">
            <h4 class="m-0 fw-bold">QUẢN LÝ ĐỊA ĐIỂM YÊU THÍCH</h4>
        </nav>

        <div class="container-fluid px-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold text-secondary m-0">DANH SÁCH ĐỊA ĐIỂM ĐÃ LƯU</h5>
                    <button id="btnExportReport" class="btn-cyber"><i class="fa-solid fa-download me-2"></i>XUẤT DỮ LIỆU</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0 align-middle text-center">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>User</th>
                                <th>Thành phố</th>
                                <th>Tọa độ</th>
                                <th>Trạng thái</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="loc, stat : ${locations}">
                                <td th:text="'#' + ${stat.index + 1}">#1</td>
                                <td class="fw-bold text-primary" th:text="${loc.account.username}">user</td>
                                <td th:text="${loc.location.cityName}">Hà Nội</td>
                                <td th:text="${loc.location.latitude + ', ' + loc.location.longitude}">21.0, 105.8</td>
                                <td><span class="badge bg-success">Đã theo dõi</span></td>
                            </tr>
                            <tr th:if="${locations == null or #lists.isEmpty(locations)}">
                                <td colspan="5" class="text-muted py-5 text-center">
                                    <i class="fa-solid fa-folder-open fs-2 mb-2"></i><br>
                                    Chưa có dữ liệu địa điểm nào.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cyber-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin/script.js}"></script>
</body>
</html>
