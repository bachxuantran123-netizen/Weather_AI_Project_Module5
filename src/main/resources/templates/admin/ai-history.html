<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Weather_AI | Lịch sử AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/admin/style.css}" rel="stylesheet" />
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar" class="shadow-sm">
        <div class="sidebar-heading text-center py-4 fs-5 fw-bold text-white border-bottom border-secondary">
            <i class="fa-solid fa-cloud-bolt text-warning me-2"></i>Weather_AI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-gauge"></i>Tổng quan</a>
            <a href="/admin/users" class="nav-link"><i class="fa-solid fa-users"></i>Quản lý User</a>
            <a href="/admin/locations" class="nav-link"><i class="fa-solid fa-map-location-dot"></i>Địa điểm yêu thích</a>
            <a href="/admin/ai-history" class="nav-link active"><i class="fa-solid fa-robot"></i>Lịch sử AI</a>
            <a href="#" class="nav-link mt-5 text-danger"><i class="fa-solid fa-right-from-bracket"></i>Đăng xuất</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-custom py-3 px-4 shadow-sm mb-4">
            <h4 class="m-0 fw-bold">LỊCH SỬ TƯ VẤN AI (GEMINI)</h4>
        </nav>

        <div class="container-fluid px-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold text-secondary m-0">LỊCH SỬ REQUEST GẦN ĐÂY</h5>
                    <div class="input-group w-25">
                        <input type="text" class="form-control" placeholder="Tìm kiếm theo User...">
                        <button class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0 align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Người dùng</th>
                                <th>Thành phố yêu cầu</th>
                                <th>Cảnh báo thảm họa (Disaster)</th>
                                <th>Thời gian</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="h : ${histories}">
                                <td th:text="'#' + ${h.id}">#1</td>
                                <td class="fw-bold text-primary" th:text="${h.account != null ? h.account.username : 'Guest'}">user123</td>
                                <td class="text-truncate" style="max-width: 200px;" th:text="${h.cityName != null ? h.cityName : 'N/A'}">Hà Nội</td>
                                <td>
                                    <span class="badge bg-secondary">Chưa lưu dữ liệu</span>
                                </td>
                                <td th:text="${#temporals.format(h.createdAt, 'dd/MM/yyyy HH:mm')}">20/06/2026 14:30</td>
                                <td>
                                    <button class="btn btn-sm btn-info text-white" th:attr="onclick=|viewAiDetail(${h.id})|" title="Xem JSON Trả về"><i class="fa-solid fa-code"></i></button>
                                </td>
                            </tr>
                            <tr th:if="${histories == null or #lists.isEmpty(histories)}">
                                <td colspan="6" class="text-center text-muted py-5">
                                    <i class="fa-solid fa-database fs-2 mb-2"></i><br>
                                    Chưa có dữ liệu truy vấn nào từ AI.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cyber-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin/script.js}"></script>

<script>
    window.viewAiDetail = function(id) {
        Swal.fire({
            title: 'Chi tiết Request #' + id,
            html: '<p class="text-start">Chức năng mở rộng xem toàn bộ <b>JSON Raw</b> trả về từ Gemini đang được phát triển trong Phase 4.</p>',
            icon: 'info',
            confirmButtonColor: '#8b5cf6'
        });
    };
</script>
</body>
</html>
