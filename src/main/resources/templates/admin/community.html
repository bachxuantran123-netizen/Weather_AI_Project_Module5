<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_AI | Cộng Đồng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/admin/style.css}" rel="stylesheet" />
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar" class="shadow-sm">
        <div class="sidebar-heading text-center py-4 fs-5 fw-bold text-white border-bottom border-secondary">
            <i class="fa-solid fa-cloud-bolt text-warning me-2"></i>Weather_AI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-gauge"></i>Tổng quan</a>
            <a href="/admin/users" class="nav-link"><i class="fa-solid fa-users"></i>Quản lý User</a>
            <a href="/admin/locations" class="nav-link"><i class="fa-solid fa-map-location-dot"></i>Địa điểm yêu thích</a>
            <a href="/admin/ai-history" class="nav-link"><i class="fa-solid fa-robot"></i>Lịch sử AI</a>
            <a href="/admin/community" class="nav-link active"><i class="fa-solid fa-newspaper"></i>Cộng đồng</a>
            <a href="#" class="nav-link mt-5 text-danger"><i class="fa-solid fa-right-from-bracket"></i>Đăng xuất</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-custom py-3 px-4 shadow-sm mb-4">
            <h4 class="m-0 fw-bold">QUẢN LÝ BÁO CÁO CỘNG ĐỒNG</h4>
        </nav>

        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-secondary m-0">DANH SÁCH BẢNG TIN</h5>
                <button class="btn btn-primary" onclick="loadCommunityReports()">
                    <i class="fa-solid fa-rotate-right"></i> Làm mới
                </button>
            </div>

            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0 align-middle">
                            <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="py-3">Người đăng</th>
                                <th class="py-3">Khu vực</th>
                                <th class="py-3">Loại sự cố</th>
                                <th class="py-3">Nội dung mô tả</th>
                                <th class="py-3">Thời gian</th>
                                <th class="py-3 text-center">Hành động</th>
                            </tr>
                            </thead>
                            <tbody id="communityTableBody">
                            <tr th:each="r : ${reports}">
                                <td class="px-4" th:text="'#' + ${r.id}"></td>
                                <td class="fw-bold text-primary" th:text="'@' + ${r.account.username}"></td>
                                <td th:text="${r.cityName}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${r.reportType == 'NGAP_LUT' ? 'bg-primary' : (r.reportType == 'TAC_DUONG' ? 'bg-warning text-dark' : (r.reportType == 'CAY_DO' ? 'bg-danger' : (r.reportType == 'MUA_DA' ? 'bg-info text-dark' : 'bg-secondary')))}"
                                        th:text="${r.reportType == 'NGAP_LUT' ? 'Ngập lụt' : (r.reportType == 'TAC_DUONG' ? 'Tắc đường' : (r.reportType == 'CAY_DO' ? 'Cây đổ' : (r.reportType == 'MUA_DA' ? 'Mưa đá' : 'Khác')))}">
                                    </span>
                                </td>
                                <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                                    th:title="${r.description}"
                                    th:text="${r.description}"></td>
                                <td style="font-size: 0.9em; color: #6c757d;" th:text="${#temporals.format(r.reportTime, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-danger" th:attr="onclick=|deleteCommunityReport(${r.id})|">
                                        <i class="fa-solid fa-trash"></i> Xóa
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${reports == null or #lists.isEmpty(reports)}">
                                <td colspan="7" class="text-center text-muted py-5">
                                    <i class="fa-solid fa-newspaper fs-2 mb-2"></i><br>
                                    Chưa có báo cáo cộng đồng nào.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cyber-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin/script.js}"></script>
</body>
</html>
