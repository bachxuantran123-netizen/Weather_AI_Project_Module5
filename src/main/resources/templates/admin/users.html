<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Weather_AI | Quản lý User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link th:href="@{/css/admin/style.css}" rel="stylesheet" />
</head>
<body>

<div class="d-flex" id="wrapper">
    <div id="sidebar" class="shadow-sm">
        <div class="sidebar-heading text-center py-4 fs-5 fw-bold text-white border-bottom border-secondary">
            <i class="fa-solid fa-cloud-bolt text-warning me-2"></i>Weather_AI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-gauge"></i>Tổng quan</a>
            <a href="/admin/users" class="nav-link active"><i class="fa-solid fa-users"></i>Quản lý User</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-map-location-dot"></i>Địa điểm yêu thích</a>
            <a href="#" class="nav-link"><i class="fa-solid fa-robot"></i>Lịch sử AI</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-custom py-3 px-4 shadow-sm mb-4">
            <h4 class="m-0 fw-bold">QUẢN LÝ NGƯỜI DÙNG</h4>
        </nav>

        <div class="container-fluid px-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold text-secondary m-0">DANH SÁCH TÀI KHOẢN</h5>
                    <button class="btn-cyber"><i class="fa-solid fa-plus me-2"></i>CẤP QUYỀN MỚI</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0 align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Vai trò</th>
                                <th>Trạng thái (Khóa/Mở)</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="'#' + ${u.id}">#1</td>
                                <td class="fw-bold text-primary" th:text="${u.username}">admin</td>
                                <td><span class="badge cyber-badge">MEMBER</span></td>
                                <td>
                                    <label class="cyber-switch">
                                        <input type="checkbox"
                                               th:checked="${u.active}"
                                               th:attr="onchange=|toggleUserStatus(${u.id}, this)|">
                                        <span class="slider"></span>
                                    </label>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cyber-toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/script.js}"></script>
</body>
</html>
