spring.application.name=Weather_AI

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/weather_ai_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=${WEATHER_API_KEY}

ai.base-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
ai.api-key=${GEMINI_API_KEY}

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration.ms=86400000

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.cache.type=redis

springdoc.packages-to-scan=com.example.weather_ai.controller.api
springdoc.paths-to-match=/api/**

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email